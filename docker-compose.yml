version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    # environment:
    #   - PORT=5000
    #   - CORS_ORIGIN=http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Expose Nginx port 80 as 3000 on the host
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
